[tool.ruff]
target-version = "py313"
line-length = 110
exclude = ["data", ".venv", "venv"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "B", "UP"]
ignore = ["E701", "E702"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B017"]
"app.py" = ["B008"]

[tool.bandit]
exclude_dirs = ["tests", "tools"]
skips = ["B101", "B104", "B105"]
